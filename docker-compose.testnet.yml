# Testnet override: Walrus testnet + Sui testnet.
#
#   docker compose -f docker-compose.yml -f docker-compose.testnet.yml up -d

name: podseq-testnet

services:
  reth:
    container_name: reth-testnet
    ports:
      - "8545:8545" # JSON-RPC
      - "8551:8551" # Engine API
      - "9001:9001/tcp" # P2P
      - "9001:9001/udp"

  podseq:
    container_name: podseq-testnet
    environment:
      # Public testnet endpoints; no auth needed, blobs are subsidized.
      WALRUS_PUBLISHER_URL: https://publisher.walrus-testnet.walrus.space
      WALRUS_AGGREGATOR_URL: https://aggregator.walrus-testnet.walrus.space
      WALRUS_EPOCHS: "53"
      SUI_RPC_URL: https://fullnode.testnet.sui.io:443
      # Settlement object IDs (after deploying the Move contract on testnet):
      # SUI_SETTLEMENT_PACKAGE_ID: 0x...
      # SUI_SETTLER_CAP_ID: 0x...
      # SUI_REGISTRY_ID: 0x...
